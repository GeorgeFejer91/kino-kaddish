    <script>
        // GitHub Pages 404 redirect to hash-based navigation
        (function() {
            var path = window.location.pathname;
            var hash = window.location.hash;
            
            // Extract the section name from the path
            var pathParts = path.split('/').filter(function(part) {
                return part && part !== 'index.html' && part !== '404.html';
            });
            
            if (pathParts.length > 0) {
                var section = pathParts[pathParts.length - 1];
                
                // Redirect to the main page with hash
                var baseUrl = window.location.origin;
                var newUrl = baseUrl + '/#' + section;
                
                console.log('Redirecting from', path, 'to', newUrl);
                window.location.replace(newUrl);
            } else if (!hash) {
                // No section found, redirect to home
                window.location.replace(window.location.origin + '/');
            }
        })();
    </script>
